# This rule is not used by the project zitadel-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over zitadel.dragonhunter274.github.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: zitadel-operator
    app.kubernetes.io/managed-by: kustomize
  name: zitadel-admin-role
rules:
- apiGroups:
  - zitadel.dragonhunter274.github.com
  resources:
  - zitadels
  verbs:
  - '*'
- apiGroups:
  - zitadel.dragonhunter274.github.com
  resources:
  - zitadels/status
  verbs:
  - get
