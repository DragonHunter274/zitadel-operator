replicaCount: 1

image:
  repository: ghcr.io/dragonhunter274/zitadel-operator
  # Overrides the image tag whose default is the chart appVersion
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  # If not set, a name is generated using the fullname template
  name: ""

leaderElection:
  enabled: true

metrics:
  enabled: true
  secure: true
  bindAddress: ":8443"
  service:
    port: 8443
    annotations: {}

serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 10m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}

securityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
